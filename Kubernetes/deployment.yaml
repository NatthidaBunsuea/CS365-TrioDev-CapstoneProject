apiVersion: apps/v1
kind: Deployment

metadata:
  name: tetris-app
  namespace: tetris-app
  labels:
    app: tetris-app

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: tetris-app
      
  template:
    metadata:
      labels:
        app: tetris-app

    spec:
      containers:
      - name: tetris-app

        image: natthidabunsuea/tetris:30

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "300m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
